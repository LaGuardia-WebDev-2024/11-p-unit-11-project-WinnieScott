<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
  <h1>My Favorite Albums rn</h1>
    <button id="mem1-button">Album 1</button>
    <button id="mem2-button">Album 2</button>
    <button id="mem3-button">Album 3</button>
    
    <ol>
      <li>
        <h3 id="mem1">Album 1</h3>
        <p id="m1">More about this memory.</p>
      </li>

      <li>
        <h3 id="mem2">Album 2</h3>
        <p id="m2">More about this memory.</p>
      </li>

      <li>
        <h3 id="mem3">Album 3</h3>
        <p id="m3">More about this memory</p>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
     $("#m1").hide();
      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
          $("#m1").slideDown();
      });
     $("#m2").hide();
      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
          $("#m2").slideDown();
      });
     $("#m3").hide();
      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
          $("#m3").slideDown();
     });
      

    </script>
  </body>
</html>
